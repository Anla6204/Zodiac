services:
  # Backend: Node.js API
  - type: web
    name: zodiac-backend
    runtime: node
    region: singapore
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000

  # Frontend: Static Site (React Vite)
  - type: web
    name: zodiac-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: zodiac-backend
          type: web
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
